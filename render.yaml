services:
  - type: web
    name: country-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: MODEL_NAME
        value: llama-3.1-8b-instant-on_demand
      - key: LOG_LEVEL
        value: INFO